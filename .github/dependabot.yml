version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    ignore:
      # RN ecosystem major bumps must be done as a deliberate migration (RN 0.74+ upgrade)
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@react-native-async-storage/async-storage'
        update-types: ['version-update:semver-major']
      # Prettier 3 requires reformatting all files — defer until planned
      - dependency-name: 'prettier'
        update-types: ['version-update:semver-major']
    groups:
      react-native-firebase:
        patterns:
          - '@react-native-firebase/*'
      react-native-ecosystem:
        patterns:
          - 'react-native'
          - 'react'
          - '@react-native/*'
          - '@react-native-community/*'
          - 'react-native-*'
      babel:
        patterns:
          - '@babel/*'
      types:
        patterns:
          - '@types/*'
      testing:
        patterns:
          - 'jest'
          - 'jest-*'
          - '@jest/*'
          - 'ts-jest'
