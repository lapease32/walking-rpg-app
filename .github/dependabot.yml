version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    ignore:
      # RN ecosystem minor/major bumps must be done as a deliberate migration.
      # react-native uses 0.x.y so "minor" = breaking native changes — never auto-bump.
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: '@react-native/*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: '@react-native-community/*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: '@react-native-async-storage/async-storage'
        update-types: ['version-update:semver-major']
      # Pinned out after PR #173 (2026-05-31): this grouped patch bump (react 19.2.6 +
      # react-native-permissions 5.5.2) reproducibly hung iOS new-user startup — the home
      # screen never loaded after archetype selection (E2E iOS red x2 vs main green x7).
      # We didn't bisect which dep is at fault, so block both exact versions; a later fixed
      # patch can still be proposed.
      - dependency-name: 'react'
        versions: ['19.2.6']
      - dependency-name: 'react-native-permissions'
        versions: ['5.5.2']
      # Prettier major upgrades require reformatting all files — defer until planned
      - dependency-name: 'prettier'
        update-types: ['version-update:semver-major']
      # TypeScript major upgrades require tsconfig and type-system migration — defer until planned
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # Metro is RN's bundler and is version-locked to the react-native release (RN 0.85.x wants
      # metro 0.84.x). Never bump metro's minor/major independently — it rides RN upgrades.
      # Patch bumps within the RN-matched line are still allowed.
      - dependency-name: 'metro'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'metro-*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
    groups:
      react-native-firebase:
        patterns:
          - '@react-native-firebase/*'
      react-native-ecosystem:
        patterns:
          - 'react-native'
          - 'react'
          # react-test-renderer is published in lockstep with react and MUST match it exactly —
          # group it here so it bumps together with react (never split into dev-tooling).
          - 'react-test-renderer'
          - '@react-native/*'
          - '@react-native-community/*'
          - 'react-native-*'
      babel:
        patterns:
          - '@babel/*'
      types:
        patterns:
          - '@types/*'
      testing:
        patterns:
          - 'jest'
          - 'jest-*'
          - '@jest/*'
          - 'ts-jest'
          # babel-jest tracks the jest version — group it with jest so they stay in lockstep
          # (never split into dev-tooling).
          - 'babel-jest'
      # Catch-all for everything else: collapse remaining dev-tooling minor+patch bumps
      # (lint-staged, eslint, husky, prettier, @typescript-eslint/*, etc.) into ONE weekly
      # PR to minimize open Dependabot PRs. Scoped to development deps only — runtime deps
      # stay ungrouped so a regression stays bisectable (cf. PR #173, where a grouped runtime
      # patch hid which dep broke iOS startup). Listed last so the named groups claim their
      # packages first.
      dev-tooling:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
        patterns:
          - '*'
