name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - functions/**

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Functions deploy requires the Blaze plan + Functions/Build APIs + a deploy SA
      # with the Cloud Functions Admin role (see functions/README.md). Gate it behind a
      # repo variable so rules/indexes keep deploying (green) until that setup is done;
      # set `DEPLOY_FUNCTIONS=true` (repo → Settings → Variables) to turn functions on.
      - name: Build functions
        if: vars.DEPLOY_FUNCTIONS == 'true'
        run: cd functions && npm ci && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy (rules + indexes always; functions when enabled)
        run: |
          targets="firestore:rules,firestore:indexes"
          if [ "${{ vars.DEPLOY_FUNCTIONS }}" = "true" ]; then
            targets="$targets,functions"
          fi
          echo "Deploying: $targets"
          firebase deploy --only "$targets" --project ${{ secrets.FIREBASE_PROJECT_ID }}
