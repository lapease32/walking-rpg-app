name: iOS Build

# Cancel superseded runs: a new push to the same ref aborts the in-flight run instead
# of queuing a duplicate (saves macOS minutes — billed 10× — + returns the latest result faster).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: iOS
    # macos-26 (arm64, Xcode 26). Pinned off macos-latest, which rotated to an Intel Xcode 26.5
    # image that dropped the x86_64 simulator Swift-compatibility libraries — breaking the build
    # with "Undefined symbols for architecture x86_64". Building arm64 on macos-26 is clean
    # (verified locally on Xcode 26), and keeps the SDK current with Apple's iOS 26 requirement.
    runs-on: macos-26
    # Pin Xcode 26.4.1: the runner's default Xcode 26.5 removed libswiftCompatibility56, which the
    # precompiled Firebase static libs force-load → "Undefined symbols … swiftCompatibility56".
    # 26.4.1 (also installed on the image) still ships it and is verified working locally. Durable
    # fix is a Firebase bump that no longer force-loads the Swift 5.6 compat lib (tracked).
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_INFO_PLIST: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICES_INFO_PLIST" | base64 -d > ios/WalkingRPGTemp/GoogleService-Info.plist

      - name: Install ccache
        run: command -v ccache || brew install ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-ios-${{ hashFiles('ios/Podfile.lock', 'yarn.lock') }}
          restore-keys: ccache-ios-

      - name: Cache CocoaPods
        id: pods-cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods
        run: cd ios && pod install ${{ steps.pods-cache.outputs.cache-hit == 'true' && '--no-repo-update' || '--repo-update' }}

      - name: Build for simulator
        run: |
          set -o pipefail
          # ARCHS=arm64: Xcode 26.5 (on macos-26) dropped the x86_64 iOS-simulator Swift-compat
          # libraries, so a generic simulator destination's x86_64 slice fails to link. arm64
          # matches the runner and is all we need to verify the app compiles. (Verified locally.)
          xcodebuild build \
            -workspace ios/WalkingRPGTemp.xcworkspace \
            -scheme WalkingRPGTemp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            -quiet
