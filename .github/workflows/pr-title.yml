name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  title-lint:
    name: Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            refactor
            docs
            test
            ci
            build
            perf
            revert
