name: E2E Android

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e-android:
    name: E2E Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 240000
      # Opt this release build into the 'testing' environment so the debug panel
      # (debug-force-encounter / debug-instant-defeat) the golden path taps stays
      # enabled. Production builds leave APP_ENV unset → debug OFF (fail-safe).
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-e2e-android-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle*') }}
          restore-keys: gradle-e2e-android-

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package.json') }}
          restore-keys: firebase-emulators-

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Start Firebase emulators
        run: |
          npx firebase emulators:start --only auth,firestore --project demo-e2e &
          echo "EMULATOR_PID=$!" >> $GITHUB_ENV
          # Wait up to 60s for both emulators to accept HTTP requests (not just TCP).
          # nc -z passes as soon as the TCP socket opens, but the Auth emulator's HTTP
          # handler may still be initializing — causing signInAnonymously() to hang.
          # curl verifies an actual HTTP response, ensuring the emulator is fully ready.
          for i in $(seq 1 30); do
            AUTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:9099/ 2>/dev/null) || AUTH="0"
            FS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:8080/ 2>/dev/null) || FS="0"
            echo "  attempt $i: auth_http=$AUTH firestore_http=$FS"
            if [ "$AUTH" != "0" ] && [ "$FS" != "0" ]; then
              echo "Emulators HTTP-ready after ${i}x2s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Firebase emulators failed to become HTTP-ready within 60s" && exit 1
            fi
            sleep 2
          done

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disk-size: 6144M
          heap-size: 512M
          avd-name: e2e-avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb shell settings put system screen_off_timeout 2147483647
            adb shell input keyevent 224
            adb shell input keyevent 82
            adb shell settings put global firebase_emulator_host 10.0.2.2
            bash e2e/scripts/check-android-emulator-connectivity.sh
            adb install android/app/build/outputs/apk/release/app-release.apk
            # Capture logcat: verbose from app/Firebase, info from MainApplication (prewarm
            # success/timeout markers), plus all warnings/errors for crash traces.
            adb logcat -v time ReactNativeJS:V Firebase:V Firestore:V FirebaseAuth:V MainApplication:I *:W > /tmp/logcat.txt &
            LOGCAT_PID=$!
            ~/.maestro/bin/maestro test e2e/maestro/golden-path.yaml --format junit --output e2e/maestro/results.xml || true
            kill $LOGCAT_PID 2>/dev/null || true
            exit $([ -f e2e/maestro/results.xml ] && grep -q 'failures="0"' e2e/maestro/results.xml && echo 0 || echo 1)

      - name: Stop Firebase emulators
        if: always()
        run: kill $EMULATOR_PID 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-results
          path: e2e/maestro/results.xml

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-android
          path: /tmp/logcat.txt
          if-no-files-found: ignore
