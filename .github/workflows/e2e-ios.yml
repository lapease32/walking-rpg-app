name: E2E iOS

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e-ios:
    name: E2E iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_INFO_PLIST: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICES_INFO_PLIST" | base64 -d > ios/WalkingRPGTemp/GoogleService-Info.plist

      - name: Cache Firebase emulator JARs
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package.json') }}
          restore-keys: firebase-emulators-

      - name: Start Firebase Auth emulator
        run: npx firebase emulators:start --only auth --project demo-e2e &

      - name: Wait for Firebase Auth emulator
        run: |
          echo "Waiting for Auth emulator on :9099..."
          for i in $(seq 60); do nc -z localhost 9099 2>/dev/null && break || sleep 1; done
          nc -z localhost 9099 2>/dev/null || (echo "Auth emulator did not start" && exit 1)
          echo "Auth emulator ready"

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      - name: Install ccache
        run: command -v ccache || brew install ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-e2e-ios-${{ hashFiles('ios/Podfile.lock', 'yarn.lock') }}
          restore-keys: ccache-e2e-ios-

      - name: Cache CocoaPods
        id: pods-cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods
        run: cd ios && pod install ${{ steps.pods-cache.outputs.cache-hit == 'true' && '--no-repo-update' || '--repo-update' }}

      - name: Build for E2E
        run: yarn e2e:build:ios

      - name: Run E2E tests
        run: yarn e2e:ios
